{% extends "base.html" %}
{% block title %}Start a Campaign — TrustFundBD{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12 space-y-8">
  <div>
    <h1 class="font-headline text-3xl font-bold tracking-tight">Start a Campaign</h1>
    <p class="text-[#5f5e5e] mt-2">Your campaign will be reviewed by our admin team before going live.</p>
  </div>

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-2xl shadow-ambient p-8 space-y-6">
    {{ csrf_field() }}
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Campaign Title *</label>
      <input type="text" name="title" required minlength="5" maxlength="150" value="{{ form.get('title','') }}" placeholder="A clear, compelling title"
             class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
    </div>
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Category *</label>
      <select name="category" class="w-full bg-[#f4f4f2] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
        {% for c in CATEGORIES %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Description *</label>
      <textarea name="description" required minlength="20" rows="6" placeholder="Tell your story. Describe the need clearly to build trust."
                class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">{{ form.get('description','') }}</textarea>
    </div>
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Fundraising Goal (BDT) *</label>
      <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-[#5f5e5e]">৳</span>
        <input type="number" name="goal_amount" min="100" required placeholder="0" value="{{ form.get('goal_amount','') }}"
               class="w-full pl-8 pr-4 py-3 bg-[#f4f4f2] rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>
    </div>

    <div class="h-px bg-[#f4f4f2] w-full"></div>
    <h2 class="font-headline font-bold text-lg">Contact Information <span class="text-xs font-normal text-[#5f5e5e]">(builds donor trust)</span></h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Phone Number</label>
        <input type="tel" name="contact_phone" placeholder="+880..." class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">WhatsApp</label>
        <input type="tel" name="contact_whatsapp" placeholder="+880..." class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Email Address</label>
        <input type="email" name="contact_email" placeholder="contact@email.com" class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Facebook Profile Link</label>
        <input type="url" name="contact_facebook" placeholder="https://facebook.com/..." class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm">
      </div>
    </div>

    <div class="h-px bg-[#f4f4f2] w-full"></div>
    <h2 class="font-headline font-bold text-lg">Campaign Images</h2>
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Main Cover Image</label>
      <input type="file" name="image" accept="image/*" class="w-full text-sm">
    </div>
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Additional Images <span class="text-[#bbcbbb] normal-case font-normal">(up to 4)</span></label>
      <input type="file" name="additional_images" accept="image/*" multiple class="w-full text-sm">
    </div>

    <button type="submit" class="w-full py-4 btn-gradient text-white font-bold rounded-full hover:opacity-90 active:scale-95 transition-all">Submit Campaign</button>
  </form>
</div>
{% endblock %}
