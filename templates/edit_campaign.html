{% extends "base.html" %}
{% block title %}Edit Description — TrustFundBD{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12 space-y-6">
  <div>
    <h1 class="font-headline text-3xl font-bold tracking-tight">Edit Campaign Description</h1>
    <p class="text-[#5f5e5e] mt-2">Changes go live only after an admin approves them — this keeps the campaign trustworthy.</p>
  </div>
  <div class="bg-white rounded-2xl shadow-ambient p-8 space-y-6">
    <div>
      <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Current Description</label>
      <p class="text-sm text-[#5f5e5e] bg-[#f4f4f2] p-4 rounded-xl whitespace-pre-line">{{ campaign.description }}</p>
    </div>
    <form method="post" class="space-y-4">
      {{ csrf_field() }}
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">New Description *</label>
        <textarea name="description" required minlength="20" rows="8"
                  class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">{{ campaign.description }}</textarea>
      </div>
      <button type="submit" class="w-full py-3 btn-gradient text-white font-bold rounded-full text-sm">Submit for Review</button>
    </form>
  </div>
</div>
{% endblock %}
