{% extends "base.html" %}
{% block title %}Sign In — TrustFundBD{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-6 py-16">
  <div class="bg-white rounded-2xl shadow-ambient p-10">
    <h1 class="font-headline text-2xl font-bold mb-2">Welcome back</h1>
    <p class="text-[#5f5e5e] text-sm mb-8">Sign in to your account to continue</p>
    <form method="post" class="space-y-5">
      {{ csrf_field() }}
      <input type="hidden" name="next" value="{{ next|default('') }}">
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Email</label>
        <input type="email" name="email" required placeholder="your@email.com"
               class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Password</label>
        <input type="password" name="password" required placeholder="••••••••"
               class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>
      <button type="submit" class="w-full py-4 btn-gradient text-white font-bold rounded-full shadow-sm hover:opacity-90 transition-all">Sign In</button>
    </form>
    <p class="text-center text-sm text-[#5f5e5e] mt-6">
      Don't have an account? <a href="{{ url_for('register') }}" class="text-[#006d37] font-semibold hover:underline">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
