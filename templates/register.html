{% extends "base.html" %}
{% block title %}Create Account — TrustFundBD{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-6 py-16">
  <div class="bg-white rounded-2xl shadow-ambient p-10">
    <h1 class="font-headline text-2xl font-bold mb-2">Create your account</h1>
    <p class="text-[#5f5e5e] text-sm mb-8">Join Bangladesh's most trusted crowdfunding platform</p>
    <form method="post" class="space-y-5">
      {{ csrf_field() }}
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Full Name</label>
        <input type="text" name="name" required placeholder="Your full name" value="{{ form.get('name','') }}"
               class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Email</label>
        <input type="email" name="email" required placeholder="your@email.com" value="{{ form.get('email','') }}"
               class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>
      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">Password</label>
        <input type="password" name="password" required minlength="6" placeholder="Min. 6 characters"
               class="w-full px-4 py-3 bg-[#f4f4f2] rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#006d37]/30">
      </div>

      <div>
        <label class="text-xs font-semibold text-[#5f5e5e] uppercase tracking-widest block mb-2">I want to…</label>
        <div class="grid grid-cols-3 gap-3">
          <label class="cursor-pointer">
            <input type="radio" name="role" value="donor" class="hidden peer" checked>
            <div class="p-3 rounded-xl border-2 border-transparent bg-[#f4f4f2] peer-checked:border-[#006d37] peer-checked:bg-[#d0e9d2] text-center transition-all">
              <span class="material-symbols-outlined text-[#006d37] block mb-1" style="font-size:20px">volunteer_activism</span>
              <p class="text-xs font-bold">Donate</p>
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="role" value="creator" class="hidden peer">
            <div class="p-3 rounded-xl border-2 border-transparent bg-[#f4f4f2] peer-checked:border-[#006d37] peer-checked:bg-[#d0e9d2] text-center transition-all">
              <span class="material-symbols-outlined text-[#006d37] block mb-1" style="font-size:20px">campaign</span>
              <p class="text-xs font-bold">Fundraise</p>
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="role" value="admin" class="hidden peer">
            <div class="p-3 rounded-xl border-2 border-transparent bg-[#f4f4f2] peer-checked:border-[#006d37] peer-checked:bg-[#d0e9d2] text-center transition-all">
              <span class="material-symbols-outlined text-[#006d37] block mb-1" style="font-size:20px">admin_panel_settings</span>
              <p class="text-xs font-bold">Admin (Demo)</p>
            </div>
          </label>
        </div>
      </div>

      <button type="submit" class="w-full py-4 btn-gradient text-white font-bold rounded-full shadow-sm hover:opacity-90 transition-all">Create Account</button>
    </form>
    <p class="text-center text-sm text-[#5f5e5e] mt-6">
      Already have an account? <a href="{{ url_for('login') }}" class="text-[#006d37] font-semibold hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
